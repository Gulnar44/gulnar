<!DOCTYPE html>
<html>
<head>
    <title>Оқушы чат-боты</title>
</head>
<body>
    <h2>💬 Оқушы көмекшісі</h2>
    <input type="text" id="userInput" placeholder="Сұрақ жаз..." />
    <button onclick="reply()">Жіберу</button>

    <p id="botReply"></p>

    <script>
        function reply() {
            let input = document.getElementById("userInput").value.toLowerCase();
            let output = "";

            if (input.includes("сәлем")) {
                output = "Сәлем! Қалай көмектесем?";
            } else if (input.includes("python")) {
                output = "Python – бұл бағдарламалау тілі 🐍";
            } else if (input.includes("сабақ")) {
                output = "Сабақ – білім алу процесі 📚";
            } else if (input.includes("тапсырма")) {
                output = "Тапсырма: 2 есеп шығару 📝";
            } else {
                output = "Кешіріңіз, түсінбедім 😅";
            }

            document.getElementById("botReply").innerText = output;
        }
    </script>
</body>
</html>
